# Server Configuration
server.port=8084

# Spring Application Name
spring.application.name=api-gateway

# --- EUREKA CLIENT CONFIGURATION ---
# Tells the gateway where to find the Eureka server to discover other services
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

# Force Eureka to use localhost instead of hostname
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false

# --- JWT SECRET KEY ---
# Secret key for validating symmetric (HS256) JWTs.
# This key MUST be the same as the one used by your authentication service.
spring.security.oauth2.resourceserver.jwt.secret-key=YmU2NjUyYjMyZmMxZTY5ODRmMjU3MDI4YjZkZGNlYjU0Njk5YmU1OTVmN2NmZWIyYjUwNTE4ZGNmYjYxMTBiNg==


# --- GATEWAY ROUTING RULES (CORRECTED FOR SERVICE DISCOVERY) ---
# Route for the User Service
spring.cloud.gateway.routes[0].id=user-service
# CHANGED: Use the load balancer (lb) to find the service via Eureka
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**

# Route for the Blog Service
spring.cloud.gateway.routes[1].id=blog-service
# CHANGED: Use the load balancer (lb) to find the service via Eureka
spring.cloud.gateway.routes[1].uri=lb://blog-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/blogs/**

# Route for the Engagement Service
spring.cloud.gateway.routes[2].id=engagement-service
# CHANGED: Use the load balancer (lb) to find the service via Eureka
spring.cloud.gateway.routes[2].uri=lb://engagement-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/engagement/**
